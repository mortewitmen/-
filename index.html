<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>SYSTEM_FAILURE</title> <style> body{margin:0;overflow:hidden;background:#000;font-family:'Courier New',monospace;cursor:none;} #glitch{position:absolute;top:0;left:0;width:100vw;height:100vh;filter:contrast(200%) brightness(150%) sepia(100%) hue-rotate(180deg);} .overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#f0f;font-size:3rem;font-weight:bold;text-transform:uppercase;pointer-events:none;mix-blend-mode:exclusion;animation:shake 0.1s infinite;} @keyframes shake{0%{transform:translate(-50%,-50%) skewX(0deg)}25%{transform:translate(-52%,-48%) skewX(5deg)}50%{transform:translate(-48%,-52%) skewX(-5deg)}75%{transform:translate(-51%,-49%) skewX(2deg)}100%{transform:translate(-50%,-50%) skewX(0deg)}} </style> </head> <body> <div class="overlay">CRITICAL ERROR</div> <canvas id="glitch"></canvas> <script> const c=document.getElementById('glitch'),x=c.getContext('2d');let w,h,d=[],m={x:0,y:0}; const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+-=[]{}|;:,.<>?/~`'; function r(){w=c.width=innerWidth;h=c.height=innerHeight;d=[];for(let i=0;i<500;i++)d.push({x:Math.random()*w,y:Math.random()*h,c:chars[Math.floor(Math.random()*chars.length)],s:Math.random()*2+1,op:Math.random(),vx:(Math.random()-0.5)*10,vy:(Math.random()-0.5)*10});} function u(){x.fillStyle='#000';x.fillRect(0,0,w,h);d.forEach(p=>{let dx=m.x-p.x,dy=m.y-p.y,d=Math.sqrt(dx*dx+dy*dy);if(d<300){p.vx+=(dx/d)*5;p.vy+=(dy/d)*5}p.x+=p.vx;p.y+=p.vy;if(p.x<-50)p.x=w+50;if(p.x>w+50)p.x=-50;if(p.y<-50)p.y=h+50;if(p.y>h+50)p.y=-50;x.font=`${p.s*20}px Courier`;x.fillStyle=`rgb(${Math.random()*255},${Math.random()*255},${Math.random()*255})`;x.fillText(p.c,p.x,p.y);if(Math.random()>0.95){x.fillRect(p.x,p.y,Math.random()*50,Math.random()*2)}});requestAnimationFrame(u);} addEventListener('resize',r);addEventListener('mousemove',e=>{m.x=e.clientX;m.y=e.clientY});r();u(); </script> </body> </html>
