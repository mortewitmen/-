<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
body{margin:0;background:#0d1117;overflow:hidden;height:100vh}
.m{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);width:160px;height:160px;background:radial-gradient(circle at 40% 30%,#4fff4f,#2ea82e);border-radius:50%;box-shadow:0 0 40px rgba(0,255,0,.4);transition:left .25s ease-out,transform .15s ease-out;animation:b 3s ease-in-out infinite}
.h{position:absolute;top:-20px;width:40px;height:40px;background:#d6d6d6;border-radius:50% 50% 0 0;transform:rotate(20deg)}
.hr{right:20px;transform:rotate(-20deg)}
.hl{left:20px}
.e{position:absolute;top:40px;left:50%;transform:translateX(-50%);width:70px;height:70px;background:#fff;border-radius:50%;overflow:hidden;animation:bl 5s infinite}
.p{position:absolute;top:22px;left:26px;width:22px;height:22px;background:#000;border-radius:50%;transition:transform .15s}
.mo{position:absolute;bottom:35px;left:50%;transform:translateX(-50%);width:70px;height:30px;background:#111;border-radius:0 0 50px 50px;transition:.15s}
.a{position:absolute;top:70px;width:26px;height:70px;background:#2ea82e;border-radius:20px;animation:w 2s ease-in-out infinite}
.al{left:-20px}
.ar{right:-20px;animation-delay:1s}
.ls{position:absolute;bottom:-25px;left:50%;transform:translateX(-50%);display:flex;gap:25px}
.l{width:26px;height:60px;background:#1f7f1f;border-radius:20px;animation:wa .35s infinite alternate ease-in-out}
.lr{animation-delay:.17s}
.s{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);width:140px;height:20px;background:rgba(0,0,0,.4);border-radius:50%;filter:blur(8px)}
@keyframes wa{0%{transform:translateY(0)}100%{transform:translateY(12px)}}
@keyframes w{0%,100%{transform:rotate(0)}50%{transform:rotate(18deg)}}
@keyframes bl{0%,92%,100%{height:70px}95%{height:8px}}
@keyframes b{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.03)}}
</style></head><body>
<div class="m">
<div class="h hl"></div><div class="h hr"></div>
<div class="e"><div class="p"></div></div>
<div class="mo"></div>
<div class="a al"></div><div class="a ar"></div>
<div class="ls"><div class="l ll"></div><div class="l lr"></div></div>
</div>
<div class="s"></div>
<script>
const m=document.querySelector(".m"),p=document.querySelector(".p"),mo=document.querySelector(".mo");
function mv(e){let x=e.clientX||e.touches?.[0]?.clientX;if(!x)return;m.style.left=x+"px";let o=(x/window.innerWidth-.5)*40;p.style.transform=`translate(${o}px,0)`;}
function tp(){m.style.transform="translateX(-50%) translateY(-25px)";mo.style.borderRadius="50px 50px 0 0";mo.style.height="10px";setTimeout(()=>{m.style.transform="translateX(-50%)";mo.style.borderRadius="0 0 50px 50px";mo.style.height="30px"},250);}
window.addEventListener("mousemove",mv);window.addEventListener("touchmove",mv);window.addEventListener("click",tp);window.addEventListener("touchstart",tp);
</script>
</body></html>
