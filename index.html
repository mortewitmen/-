<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D NEURAL VOID</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #u { 
            position: fixed; top: 20px; left: 20px; color: #fff; 
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); 
            padding: 15px; border-radius: 12px; z-index: 100; 
            font-family: sans-serif; border: 1px solid rgba(255,255,255,0.2);
            pointer-events: none;
        }
    </style>
    <script src="https://cloudflare.com"></script>
</head>
<body>
    <div id="u">SYSTEM: <span id="st">INITIALIZING</span></div>
    <script>
    (function() {
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.02); //

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 25, 40); // Move camera back to see the scene
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio); // Ensure crisp rendering
        document.body.appendChild(renderer.domElement);

        // Lighting
        const light1 = new THREE.PointLight(0xff00ff, 2, 100);
        scene.add(light1);
        const light2 = new THREE.PointLight(0x00ffff, 2, 100);
        scene.add(light2);

        // Reflective Floor
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1, metalness: 0.8 });
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // Floating Monoliths
        for (let i = 0; i < 40; i++) {
            const h = Math.random() * 15 + 5;
            const m = new THREE.Mesh(
                new THREE.BoxGeometry(1, h, 1), 
                new THREE.MeshStandardMaterial({ color: 0x222222, emissive: 0x111111 })
            );
            m.position.set((Math.random() - 0.5) * 100, h / 2, (Math.random() - 0.5) * 100);
            scene.add(m);
        }

        // Units with Floating Limbs
        const units = [];
        const types = [{n: "Echo", c: 0x00ffff}, {n: "Nova", c: 0xff00ff}];

        function spawnUnit() {
            const type = types[Math.floor(Math.random() * types.length)];
            const group = new THREE.Group();
            
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.6, 16, 16), new THREE.MeshStandardMaterial({ color: 0x444444 }));
            const visor = new THREE.Mesh(new THREE.TorusGeometry(0.4, 0.05, 8, 24), new THREE.MeshStandardMaterial({ color: type.c, emissive: type.c }));
            visor.rotation.x = Math.PI / 2;
            
            const handL = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), new THREE.MeshStandardMaterial({ color: type.c, emissive: type.c }));
            const handR = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), new THREE.MeshStandardMaterial({ color: type.c, emissive: type.c }));
            
            group.add(body, visor, handL, handR);
            group.position.set((Math.random() - 0.5) * 40, 2, (Math.random() - 0.5) * 40);
            scene.add(group);
            
            units.push({ 
                el: group, hL: handL, hR: handR, type: type, 
                vel: new THREE.Vector3((Math.random() - 0.5) * 0.1, 0, (Math.random() - 0.5) * 0.1) 
            });
        }

        for (let i = 0; i < 6; i++) spawnUnit();

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            light1.position.set(Math.cos(time) * 30, 15, Math.sin(time) * 30);
            light2.position.set(Math.sin(time) * 30, 15, Math.cos(time) * 30);

            units.forEach(u => {
                u.el.position.add(u.vel);
                u.el.position.y = 2 + Math.sin(time * 2 + u.el.position.x) * 0.3;
                
                // Animate Floating Limbs
                u.hL.position.set(-1.2, Math.sin(time * 4) * 0.4, 0);
                u.hR.position.set(1.2, Math.cos(time * 4) * 0.4, 0);

                if (Math.abs(u.el.position.x) > 50 || Math.abs(u.el.position.z) > 50) u.vel.negate();
            });

            renderer.render(scene, camera);
            document.getElementById('st').innerText = "STABLE";
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    })();
    </script>
</body>
</html>
