<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Neon Void</title> <style> body{margin:0;overflow:hidden;background:#000;font-family:monospace;} canvas{display:block;} .ui{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#0ff;text-shadow:0 0 10px #0ff;pointer-events:none;mix-blend-mode:screen;} h1{font-size:4rem;margin:0;letter-spacing:5px;animation:glitch 2s infinite;} p{font-size:1.2rem;opacity:0.8;} @keyframes glitch{0%{transform:translate(0)}20%{transform:translate(-2px,2px)}40%{transform:translate(-2px,-2px)}60%{transform:translate(2px,2px)}80%{transform:translate(2px,-2px)}100%{transform:translate(0)}} </style> </head> <body> <div class="ui"><h1>NEON VOID</h1><p>MOVE MOUSE TO DISRUPT THE FIELD</p></div> <canvas id="c"></canvas> <script> const c=document.getElementById('c'),x=c.getContext('2d');let w,h,p=[],m={x:0,y:0}; function r(){w=c.width=innerWidth;h=c.height=innerHeight;p=[];for(let i=0;i<200;i++)p.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,s:Math.random()*2+1});} function u(){x.clearRect(0,0,w,h);x.fillStyle='#000';x.fillRect(0,0,w,h);p.forEach((p,i)=>{let dx=m.x-p.x,dy=m.y-p.y,d=Math.sqrt(dx*dx+dy*dy);if(d<200){let f=(200-d)/200;p.vx-=dx*f*0.05;p.vy-=dy*f*0.05}p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>w)p.vx*=-1;if(p.y<0||p.y>h)p.vy*=-1;x.beginPath();x.arc(p.x,p.y,p.s,0,Math.PI*2);x.fillStyle=`hsl(${(Date.now()/10+p.x)%360},100%,50%)`;x.fill();for(let j=i+1;j<p.length;j++){let q=p[j],ddx=p.x-q.x,ddy=p.y-q.y,dd=Math.sqrt(ddx*ddx+ddy*ddy);if(dd<100){x.beginPath();x.moveTo(p.x,p.y);x.lineTo(q.x,q.y);x.strokeStyle=`rgba(0,255,255,${1-dd/100})`;x.stroke()}}});requestAnimationFrame(u);} addEventListener('resize',r);addEventListener('mousemove',e=>{m.x=e.clientX;m.y=e.clientY});r();u(); </script> </body> </html>
