<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"><title>Interactive 3D Character</title><style>body{margin:0;overflow:hidden;background-color:#1a1a1a;font-family:sans-serif;touch-action:none}canvas{display:block}#instructions{position:absolute;top:20px;width:100%;text-align:center;color:white;pointer-events:none;text-shadow:1px 1px 2px black;padding:0 10px;box-sizing:border-box}@media(max-width:600px){#instructions h2{font-size:1.2rem}#instructions p{font-size:0.9rem}}</style></head><body><div id="instructions"><h2>Interactive 3D Character</h2><p>Desktop: Move mouse to look • Click to jump<br>Mobile: Swipe to move • Tap to jump</p></div><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script>const s=new THREE.Scene();s.background=new THREE.Color(0x202025);s.fog=new THREE.Fog(0x202025,10,50);const c=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);c.position.z=5;c.position.y=2;const r=new THREE.WebGLRenderer({antialias:true});r.setSize(window.innerWidth,window.innerHeight);r.shadowMap.enabled=true;document.body.appendChild(r.domElement);const al=new THREE.AmbientLight(0xffffff,0.6);s.add(al);const dl=new THREE.DirectionalLight(0xffffff,0.8);dl.position.set(5,10,7);dl.castShadow=true;s.add(dl);const cg=new THREE.Group();const bm=new THREE.MeshStandardMaterial({color:0x3498db,roughness:0.4});const hm=new THREE.MeshStandardMaterial({color:0xe74c3c,roughness:0.4});const em=new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:0.5});const bg=new THREE.BoxGeometry(1,1.5,0.8);const b=new THREE.Mesh(bg,bm);b.position.y=0.75;b.castShadow=true;cg.add(b);const hg=new THREE.BoxGeometry(0.8,0.8,0.8);const h=new THREE.Mesh(hg,hm);h.position.y=1.9;h.castShadow=true;cg.add(h);const eg=new THREE.SphereGeometry(0.15,16,16);const le=new THREE.Mesh(eg,em);le.position.set(-0.2,1.9,0.4);cg.add(le);const re=new THREE.Mesh(eg,em);re.position.set(0.2,1.9,0.4);cg.add(re);const ag=new THREE.BoxGeometry(0.3,1,0.3);const la=new THREE.Mesh(ag,bm);la.position.set(-0.7,0.75,0);la.castShadow=true;cg.add(la);const ra=new THREE.Mesh(ag,bm);ra.position.set(0.7,0.75,0);ra.castShadow=true;cg.add(ra);s.add(cg);const fg=new THREE.PlaneGeometry(50,50);const fm=new THREE.MeshStandardMaterial({color:0x444444,roughness:0.8});const f=new THREE.Mesh(fg,fm);f.rotation.x=-Math.PI/2;f.receiveShadow=true;s.add(f);const rc=new THREE.Raycaster();const m=new THREE.Vector2();let ij=false;let jv=0;let oc=bm.color.getHex();let tsx=0;let tsy=0;let id=false;document.addEventListener("mousemove",(e)=>{m.x=(e.clientX/window.innerWidth)*2-1;m.y=-(e.clientY/window.innerHeight)*2+1});const hi=()=>{if(!ij){ij=true;jv=0.2;bm.color.setHex(0xf1c40f);setTimeout(()=>{bm.color.setHex(oc)},500)}};document.addEventListener("click",hi);document.addEventListener("touchend",(e)=>{if(!id)hi()});document.addEventListener("touchstart",(e)=>{tsx=e.touches[0].clientX;tsy=e.touches[0].clientY;id=false},{passive:false});document.addEventListener("touchmove",(e)=>{e.preventDefault();const teX=e.touches[0].clientX;const teY=e.touches[0].clientY;const dX=teX-tsx;const dY=teY-tsy;if(Math.abs(dX)>10||Math.abs(dY)>10){id=true}const sX=(dX/window.innerWidth)*2;const sY=(dY/window.innerHeight)*2;m.x+=sX*0.1;m.y-=sY*0.1;m.x=Math.max(-1,Math.min(1,m.x));m.y=Math.max(-1,Math.min(1,m.y))},{passive:false});document.addEventListener("touchend",()=>{});window.addEventListener("resize",()=>{c.aspect=window.innerWidth/window.innerHeight;c.updateProjectionMatrix();r.setSize(window.innerWidth,window.innerHeight)});function a(){requestAnimationFrame(a);rc.setFromCamera(m,c);const pz=new THREE.Plane(new THREE.Vector3(0,0,1),0);const tp=new THREE.Vector3();if(rc.ray.intersectPlane(pz,tp)){const lt=new THREE.Vector3(tp.x,tp.y,5);cg.lookAt(lt);cg.rotation.x=Math.max(-0.5,Math.min(0.5,cg.rotation.x))}if(ij){cg.position.y+=jv;jv-=0.01;if(cg.position.y<=0){cg.position.y=0;ij=false;jv=0;b.scale.set(1.2,0.8,1.2);setTimeout(()=>{b.scale.set(1,1,1)},100)}else{b.scale.set(0.9,1.1,0.9)}}else{b.scale.lerp(new THREE.Vector3(1,1,1),0.1)}if(!ij){cg.position.y=Math.sin(Date.now()*0.002)*0.05}r.render(s,c)}a();</script></body></html>
