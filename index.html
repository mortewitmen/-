<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <style>
      body {
        margin: 0;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .ball {
        width: 80px;
        height: 80px;
        background: #00ffff;
        border-radius: 50%;
        animation: bounce 2s infinite ease-in-out;
      }
      @keyframes bounce {
        0% { transform: translateY(0); }
        50% { transform: translateY(-150px); }
        100% { transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div class="ball"></div>
  </body>
</html>
